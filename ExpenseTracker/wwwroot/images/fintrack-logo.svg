<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40" role="img" aria-label="FinTrack logo">
  <!-- Rounded indigo background -->
  <rect width="40" height="40" rx="9" fill="#4f46e5"/>
  <!-- Bar chart: three ascending bars -->
  <rect x="7"  y="26" width="6" height="9"  rx="2" fill="rgba(255,255,255,0.65)"/>
  <rect x="17" y="18" width="6" height="17" rx="2" fill="rgba(255,255,255,0.82)"/>
  <rect x="27" y="10" width="6" height="25" rx="2" fill="rgba(255,255,255,1)"/>
  <!-- Upward trend line connecting bar tops -->
  <polyline points="10,26 20,18 30,10"
            stroke="#a5f3fc" stroke-width="2.5"
            fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Dot at trend peak -->
  <circle cx="30" cy="10" r="2.5" fill="#a5f3fc"/>
</svg>
